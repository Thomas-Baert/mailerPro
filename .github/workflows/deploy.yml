name: Deploy Docker to VPS

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Projects (Turborepo)
        run: npm run build

      - name: Transfer Files to VPS via RSYNC
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "./" 
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/var/www/mailerPro"
          # On exclut les node_modules. Docker les installera en interne de façon isolée !
          EXCLUDE: "/node_modules/, /.git/, /apps/web/node_modules/, /apps/api/node_modules/, /apps/bot/node_modules/"

      - name: Process Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/mailerPro
            
            # Construit les nouvelles images Docker en utilisant le code fraîchement poussé
            docker compose build
            
            # Relance les conteneurs en tâche de fond (-d) sans interruption (recreates only if changed)
            docker compose up -d
            
            # Nettoie les anciennes images non utilisées pour ne pas saturer l'espace disque du VPS
            docker image prune -f
